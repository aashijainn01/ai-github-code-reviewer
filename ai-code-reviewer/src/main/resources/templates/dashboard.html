<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Code Reviewer Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: #222;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .status-completed {
            color: green;
            font-weight: bold;
        }

        .status-skipped {
            color: orange;
            font-weight: bold;
        }

        .status-failed {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>AI Code Reviewer Dashboard</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Repository</th>
            <th>PR Number</th>
            <th>Status</th>
            <th>Review</th>
            <th>Created At</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="review : ${reviews}">
            <td th:text="${review.id}"></td>
            <td th:text="${review.repoName}"></td>
            <td th:text="${review.prNumber}"></td>
            <td>
                <span th:text="${review.status}"
                      th:classappend="${review.status == 'COMPLETED'} ? 'status-completed' :
                                      (${review.status == 'SKIPPED'} ? 'status-skipped' : 'status-failed')">
                </span>
            </td>
            <td th:text="${review.reviewText}"></td>
            <td th:text="${review.createdAt}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
